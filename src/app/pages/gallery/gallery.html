<section class="page-hero">
  <h1>Gallery</h1>
  <!-- <p>Cosplays, characters & captured moments</p> -->
</section>

<div class="gallery-grid page-container">
  @for (item of galleryItems; track item.name) {
    <figure
      class="gallery-grid__item"
      [class.gallery-grid__item--clickable]="isDesktop()"
      (click)="openLightbox(item)"
    >
      <img [src]="item.image" [alt]="item.name + ' cosplay'" loading="lazy" />
      <figcaption>{{ item.name }}</figcaption>
    </figure>
  }
</div>

@if (selectedItem(); as item) {
  <div class="gallery-lightbox" (click)="closeLightbox()">
    <div class="gallery-lightbox__dialog" (click)="$event.stopPropagation()">
      <button
        type="button"
        class="gallery-lightbox__close"
        (click)="closeLightbox()"
        aria-label="Close"
      >
        &times;
      </button>
      <img [src]="item.image" [alt]="item.name + ' cosplay'" />
      <p class="gallery-lightbox__caption">{{ item.name }}</p>
    </div>
  </div>
}
